<a [routerLink]="['/juego', juego().id]" class="game-card group block">
  <div class="relative aspect-[3/4] overflow-hidden">
    <img
      [src]="juego().portada"
      [alt]="juego().titulo"
      loading="lazy"
      class="h-full w-full object-cover transition-transform duration-500 ease-out group-hover:scale-110"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-void via-void/10 to-transparent"></div>
    <span [class]="'badge-' + juego().estado + ' absolute right-2 top-2 backdrop-blur-md'">
      {{ estadoLabel[juego().estado] }}
    </span>
  </div>

  <div class="space-y-2 p-4">
    <h3 class="truncate font-display text-sm font-bold text-white group-hover:text-neon-cyan">
      {{ juego().titulo }}
    </h3>

    <div class="flex items-center justify-between text-xs text-slate-400">
      <span class="truncate">{{ juego().genero }}</span>
      <span class="flex items-center gap-1 font-semibold text-neon-magenta">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="currentColor">
          <path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
        </svg>
        {{ juego().rating }}/10
      </span>
    </div>

    <div class="flex flex-wrap gap-1.5">
      @for (plataforma of juego().plataformas; track plataforma) {
        <span class="rounded border border-white/10 bg-white/5 px-1.5 py-0.5 text-[10px] uppercase tracking-wide text-slate-400">
          {{ plataforma }}
        </span>
      }
    </div>
  </div>
</a>
