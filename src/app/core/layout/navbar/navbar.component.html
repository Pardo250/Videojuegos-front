<header class="sticky top-0 z-50 border-b border-white/10 bg-void/70 backdrop-blur-xl">
  <nav class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6">
    <a routerLink="/dashboard" class="flex items-center gap-2 font-display text-lg font-bold tracking-widest text-white">
      <span class="bg-gradient-to-r from-neon-violet to-neon-cyan bg-clip-text text-transparent">GAME</span>VAULT
    </a>

    <ul class="hidden items-center gap-1 md:flex">
      @for (link of links; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="text-white bg-white/5 shadow-glow-violet"
            class="flex items-center gap-2 rounded-md px-4 py-2 font-sans text-sm font-semibold text-slate-300 transition-all duration-200 hover:bg-white/5 hover:text-neon-cyan"
          >
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path [attr.d]="link.icon" />
            </svg>
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <div class="hidden items-center gap-3 md:flex">
      <a routerLink="/login" class="btn-outline !px-4 !py-2 !text-xs">Iniciar sesión</a>
      <a routerLink="/register" class="btn-neon !px-4 !py-2 !text-xs">Registrarse</a>
    </div>

    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-md border border-white/10 text-slate-200 md:hidden"
      (click)="toggleMenu()"
      aria-label="Abrir menú"
    >
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </nav>

  @if (menuOpen()) {
    <ul class="flex flex-col gap-1 border-t border-white/10 bg-void-surface px-4 py-3 md:hidden">
      @for (link of links; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="text-neon-cyan"
            class="block rounded-md px-3 py-2 font-sans text-sm font-semibold text-slate-300"
            (click)="toggleMenu()"
          >
            {{ link.label }}
          </a>
        </li>
      }
      <li class="flex gap-2 pt-2">
        <a routerLink="/login" class="btn-outline flex-1 text-center !px-4 !py-2 !text-xs">Entrar</a>
        <a routerLink="/register" class="btn-neon flex-1 text-center !px-4 !py-2 !text-xs">Registro</a>
      </li>
    </ul>
  }
</header>
