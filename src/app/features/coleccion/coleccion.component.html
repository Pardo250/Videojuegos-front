<section class="space-y-2">
  <p class="font-sans text-sm font-semibold uppercase tracking-widest text-neon-cyan">Tu biblioteca</p>
  <h1 class="font-display text-3xl font-bold text-white sm:text-4xl">Colección</h1>
</section>

<section class="mt-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
  <div class="flex flex-wrap gap-2">
    @for (filtro of filtros; track filtro) {
      <button
        type="button"
        (click)="setFiltro(filtro)"
        [class]="filtroActivo() === filtro
          ? 'rounded-full bg-gradient-to-r from-neon-violet to-neon-cyan px-4 py-1.5 text-xs font-bold uppercase tracking-wide text-white shadow-glow-violet'
          : 'rounded-full border border-white/10 px-4 py-1.5 text-xs font-semibold uppercase tracking-wide text-slate-400 transition-colors hover:border-neon-violet/50 hover:text-white'"
      >
        {{ filtro === 'todos' ? 'Todos' : estadoLabel[filtro] }}
      </button>
    }
  </div>

  <select
    class="input-gamer w-full text-sm sm:w-auto"
    (change)="setOrden($any($event.target).value)"
  >
    <option value="reciente">Más recientes</option>
    <option value="rating">Mejor valorados</option>
    <option value="horas">Más jugados</option>
    <option value="titulo">A-Z</option>
  </select>
</section>

@if (resultado().length > 0) {
  <section class="mt-6 grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5">
    @for (juego of resultado(); track juego.id) {
      <app-game-card [juego]="juego" />
    }
  </section>
} @else {
  <p class="mt-16 text-center text-slate-500">No tienes juegos en este estado todavía.</p>
}
