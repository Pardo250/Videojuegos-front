<section class="space-y-2">
  <p class="font-sans text-sm font-semibold uppercase tracking-widest text-neon-cyan">Bienvenido de vuelta</p>
  <h1 class="font-display text-3xl font-bold text-white sm:text-4xl">Tu Dashboard</h1>
</section>

<section class="mt-8 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
  <app-stat-card label="Juegos en tu colección" [value]="totalJuegos()" accent="violet"
    icon="M4 5h16v3H4V5Zm0 6h16v3H4v-3Zm0 6h16v3H4v-3Z" />
  <app-stat-card label="Horas jugadas" [value]="horasTotales()" suffix="h" accent="cyan"
    icon="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  <app-stat-card label="Completados" [value]="completados()" accent="green"
    icon="m5 13 4 4L19 7" />
  <app-stat-card label="Jugando ahora" [value]="jugando()" accent="magenta"
    icon="M5 12h14M12 5v14" />
</section>

<section class="mt-12">
  <div class="mb-4 flex items-center justify-between">
    <h2 class="font-display text-xl font-bold text-white">Jugados recientemente</h2>
    <a routerLink="/coleccion" class="text-sm font-semibold text-neon-cyan hover:underline">Ver toda la colección →</a>
  </div>

  <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4">
    @for (juego of recientes(); track juego.id) {
      <app-game-card [juego]="juego" />
    }
  </div>
</section>
