@let j = juego();

<div class="grid grid-cols-1 gap-8 lg:grid-cols-[320px_1fr]">
  <div class="game-card overflow-hidden">
    <img [src]="j.portada" [alt]="j.titulo" class="aspect-[3/4] w-full object-cover" />
  </div>

  <div>
    <span [class]="'badge-' + j.estado">{{ estadoLabel[j.estado] }}</span>
    <h1 class="mt-3 font-display text-3xl font-bold text-white sm:text-4xl">{{ j.titulo }}</h1>
    <p class="mt-1 text-sm text-slate-400">
      {{ j.genero }} · Lanzamiento {{ j.fechaLanzamiento | date: 'longDate' }}
    </p>

    <div class="mt-4 flex flex-wrap gap-2">
      @for (plataforma of j.plataformas; track plataforma) {
        <span class="rounded-md border border-white/10 bg-white/5 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-slate-300">
          {{ plataforma }}
        </span>
      }
    </div>

    <div class="mt-6 grid grid-cols-2 gap-4 sm:grid-cols-3">
      <div class="game-card p-4">
        <p class="font-display text-2xl font-bold text-neon-magenta">{{ j.rating }}/10</p>
        <p class="text-xs uppercase tracking-wide text-slate-400">Tu rating</p>
      </div>
      <div class="game-card p-4">
        <p class="font-display text-2xl font-bold text-neon-cyan">{{ j.horasJugadas }}h</p>
        <p class="text-xs uppercase tracking-wide text-slate-400">Horas jugadas</p>
      </div>
    </div>

    <div class="mt-8">
      <h2 class="font-display text-lg font-bold text-white">Tu reseña</h2>
      <textarea
        rows="4"
        placeholder="Escribe lo que pensaste de este juego..."
        class="input-gamer mt-2 w-full resize-none"
        [value]="resena()"
        (input)="resena.set($any($event.target).value)"
      ></textarea>
      <button type="button" class="btn-neon mt-3">Guardar reseña</button>
    </div>
  </div>
</div>
