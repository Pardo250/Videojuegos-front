<div class="mx-auto flex min-h-[70vh] max-w-md flex-col justify-center">
  <div class="game-card p-8">
    <div class="mb-6 text-center">
      <h1 class="font-display text-2xl font-bold text-white">
        Crea tu <span class="bg-gradient-to-r from-neon-violet to-neon-cyan bg-clip-text text-transparent">cuenta</span>
      </h1>
      <p class="mt-2 text-sm text-slate-400">Empieza a registrar tu colección de juegos</p>
    </div>

    @if (errorMessage()) {
      <p class="mb-4 rounded-md border border-rose-500/40 bg-rose-500/10 px-3 py-2 text-sm text-rose-300">
        {{ errorMessage() }}
      </p>
    }

    <form class="space-y-4" (submit)="$event.preventDefault(); onSubmit()">
      <div>
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-400">Nombre de usuario</label>
        <input
          type="text"
          placeholder="tu_usuario"
          class="input-gamer w-full"
          [value]="username()"
          (input)="username.set($any($event.target).value)"
        />
      </div>

      <div>
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-400">Correo</label>
        <input
          type="email"
          placeholder="tucorreo@ejemplo.com"
          class="input-gamer w-full"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
        />
      </div>

      <div>
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-400">Contraseña</label>
        <input
          type="password"
          placeholder="••••••••"
          class="input-gamer w-full"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
        />
      </div>

      <button type="submit" class="btn-neon w-full" [disabled]="loading()">
        {{ loading() ? 'Creando...' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-400">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="font-semibold text-neon-cyan hover:underline">Inicia sesión</a>
    </p>
  </div>
</div>
